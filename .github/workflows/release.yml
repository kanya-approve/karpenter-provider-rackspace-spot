name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  release:
    name: build & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Derive versions
        id: versions
        run: |
          APP_VERSION="${GITHUB_REF_NAME}"
          if [[ ! "${APP_VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.+)?$ ]]; then
            echo "::error::Release tag must be SemVer prefixed with v, got ${APP_VERSION}"
            exit 1
          fi
          CHART_VERSION="${APP_VERSION#v}"
          {
            echo "app-version=${APP_VERSION}"
            echo "chart-version=${CHART_VERSION}"
          } >> "${GITHUB_OUTPUT}"

      - uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Lint + package Helm chart
        run: |
          helm lint charts/karpenter
          mkdir -p dist
          helm package charts/karpenter \
            --version "${{ steps.versions.outputs.chart-version }}" \
            --app-version "${{ steps.versions.outputs.app-version }}" \
            --destination dist

      - uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: |
            VERSION=${{ steps.versions.outputs.app-version }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.versions.outputs.app-version }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Push Helm chart to OCI registry
        run: |
          helm push "dist/karpenter-provider-rackspace-spot-${{ steps.versions.outputs.chart-version }}.tgz" \
            "oci://ghcr.io/${{ github.repository_owner }}/charts"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/karpenter-provider-rackspace-spot-${{ steps.versions.outputs.chart-version }}.tgz
