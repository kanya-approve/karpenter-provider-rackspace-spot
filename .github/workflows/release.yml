name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write

env:
  KO_DOCKER_REPO: ghcr.io/${{ github.repository }}

jobs:
  release:
    name: build & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Derive versions
        id: versions
        run: |
          APP_VERSION="${GITHUB_REF_NAME}"
          if [[ ! "${APP_VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.+)?$ ]]; then
            echo "::error::Release tag must be SemVer prefixed with v, got ${APP_VERSION}"
            exit 1
          fi
          CHART_VERSION="${APP_VERSION#v}"
          {
            echo "app-version=${APP_VERSION}"
            echo "chart-version=${CHART_VERSION}"
          } >> "${GITHUB_OUTPUT}"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: latest

      - name: Lint + package Helm chart
        run: |
          helm lint charts/karpenter
          mkdir -p dist
          helm package charts/karpenter \
            --version "${{ steps.versions.outputs.chart-version }}" \
            --app-version "${{ steps.versions.outputs.app-version }}" \
            --destination dist

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: ko-build/setup-ko@61b4d1d396f5b2e7d6bb6fefdce3dc38d1a13445 # v0.10

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Build & push image
        run: |
          ko build --bare ./cmd/controller \
            --platform=linux/amd64,linux/arm64 \
            --tags=${{ steps.versions.outputs.app-version }},latest

      - name: Sign image (cosign keyless)
        run: |
          cosign sign --yes \
            "ghcr.io/${{ github.repository }}:${{ steps.versions.outputs.app-version }}"

      - name: Push Helm chart to OCI registry
        run: |
          helm push "dist/karpenter-provider-rackspace-spot-${{ steps.versions.outputs.chart-version }}.tgz" \
            "oci://ghcr.io/${{ github.repository_owner }}/charts"

      - name: Sign chart (cosign keyless)
        run: |
          cosign sign --yes \
            "ghcr.io/${{ github.repository_owner }}/charts/karpenter-provider-rackspace-spot:${{ steps.versions.outputs.chart-version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
          files: |
            dist/karpenter-provider-rackspace-spot-${{ steps.versions.outputs.chart-version }}.tgz
