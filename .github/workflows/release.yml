name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write

env:
  KO_DOCKER_REPO: ghcr.io/${{ github.repository }}

jobs:
  release:
    name: build & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Derive versions
        id: versions
        run: |
          APP_VERSION="${GITHUB_REF_NAME}"
          if [[ ! "${APP_VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.+)?$ ]]; then
            echo "::error::Release tag must be SemVer prefixed with v, got ${APP_VERSION}"
            exit 1
          fi
          CHART_VERSION="${APP_VERSION#v}"
          {
            echo "app-version=${APP_VERSION}"
            echo "chart-version=${CHART_VERSION}"
          } >> "${GITHUB_OUTPUT}"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: azure/setup-helm@v5
        with:
          version: latest

      - name: Lint + package Helm chart
        run: |
          helm lint charts/karpenter
          mkdir -p dist
          helm package charts/karpenter \
            --version "${{ steps.versions.outputs.chart-version }}" \
            --app-version "${{ steps.versions.outputs.app-version }}" \
            --destination dist

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: ko-build/setup-ko@v0.9

      - uses: sigstore/cosign-installer@v3

      - name: Build & push image
        run: |
          ko build --bare ./cmd/controller \
            --platform=linux/amd64,linux/arm64 \
            --tags=${{ steps.versions.outputs.app-version }},latest

      - name: Sign image (cosign keyless)
        run: |
          cosign sign --yes \
            "ghcr.io/${{ github.repository }}:${{ steps.versions.outputs.app-version }}"

      - name: Push Helm chart to OCI registry
        run: |
          helm push "dist/karpenter-provider-rackspace-spot-${{ steps.versions.outputs.chart-version }}.tgz" \
            "oci://ghcr.io/${{ github.repository_owner }}/charts"

      - name: Sign chart (cosign keyless)
        run: |
          cosign sign --yes \
            "ghcr.io/${{ github.repository_owner }}/charts/karpenter-provider-rackspace-spot:${{ steps.versions.outputs.chart-version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/karpenter-provider-rackspace-spot-${{ steps.versions.outputs.chart-version }}.tgz
