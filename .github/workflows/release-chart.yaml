name: Release chart

on:
  push:
    branches: [main]
    paths:
      - "charts/**"

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: release-chart
  cancel-in-progress: false

env:
  CHART_PATH: charts/karpenter
  CHART_NAME: karpenter-provider-rackspace-spot

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: latest

      - name: Derive snapshot chart version
        id: ver
        run: |
          BASE=$(awk '/^version:/{print $2; exit}' "${CHART_PATH}/Chart.yaml")
          IFS='.' read -r MAJOR MINOR PATCH <<< "${BASE%%-*}"
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))-snapshot.${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Snapshot chart version: ${VERSION}"

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Package + push
        run: |
          mkdir -p dist
          helm package "${CHART_PATH}" \
            --version "${{ steps.ver.outputs.version }}" \
            --app-version "sha-${GITHUB_SHA}" \
            --destination dist
          helm push "dist/${CHART_NAME}-${{ steps.ver.outputs.version }}.tgz" \
            "oci://ghcr.io/${{ github.repository_owner }}/charts"

      - name: Sign chart (cosign keyless)
        run: |
          cosign sign --yes \
            "ghcr.io/${{ github.repository_owner }}/charts/${CHART_NAME}:${{ steps.ver.outputs.version }}"
