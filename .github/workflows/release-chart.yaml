name: Release chart

on:
  push:
    branches: [main]
    paths:
      - "charts/**"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-chart
  cancel-in-progress: false

env:
  CHART_PATH: charts/karpenter
  CHART_NAME: karpenter-provider-rackspace-spot

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5
        with:
          version: latest

      - name: Derive snapshot chart version
        id: ver
        run: |
          BASE=$(awk '/^version:/{print $2; exit}' "${CHART_PATH}/Chart.yaml")
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="${BASE}-main.${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Snapshot chart version: ${VERSION}"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package + push
        run: |
          mkdir -p dist
          helm package "${CHART_PATH}" \
            --version "${{ steps.ver.outputs.version }}" \
            --app-version "sha-${GITHUB_SHA}" \
            --destination dist
          helm push "dist/${CHART_NAME}-${{ steps.ver.outputs.version }}.tgz" \
            "oci://ghcr.io/${{ github.repository_owner }}/charts"