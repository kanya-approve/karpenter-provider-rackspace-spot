  names:
    categories:
    - karpenter
    kind: RackspaceSpotNodeClass
    listKind: RackspaceSpotNodeClassList
    plural: rackspacespotnodeclasses
    shortNames:
    - rsnc
    - rsncs
    singular: rackspacespotnodeclass
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.cloudspaceName
      name: Cloudspace
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          RackspaceSpotNodeClass binds a Karpenter NodePool to a specific Rackspace
          Spot Cloudspace and selects which ServerClasses (instance types) are
          eligible for provisioning.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              RackspaceSpotNodeClassSpec is the user-facing configuration for a
              RackspaceSpotNodeClass.
            properties:
              annotations:
                additionalProperties:
                  type: string
                description: |-
                  Annotations are propagated to the underlying Rackspace pool's
                  CustomAnnotations.
                type: object
              cloudspaceName:
                description: |-
                  CloudspaceName is the Rackspace Spot Cloudspace into which pools are
                  provisioned. The Cloudspace must exist before the NodeClass is
                  referenced by a NodePool.
                minLength: 1
                type: string
              labels:
                additionalProperties:
                  type: string
                description: |-
                  Labels are propagated to the underlying Rackspace pool's CustomLabels
                  and thus to the resulting Kubernetes Node labels.
                type: object
              serverClassSelector:
                description: |-
                  ServerClassSelector narrows which ServerClasses are considered when
                  scheduling. If unset, all ServerClasses in the Cloudspace's region are
                  eligible.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              taints:
                description: |-
                  Taints are propagated to the underlying Rackspace pool's CustomTaints
                  and thus to the resulting Kubernetes Node taints.
                items:
                  description: |-
                    The node this Taint is attached to has the "effect" on
                    any pod that does not tolerate the Taint.
                  properties:
                    effect:
                      description: |-
                        Required. The effect of the taint on pods
                        that do not tolerate the taint.
                        Valid effects are NoSchedule, PreferNoSchedule and NoExecute.
                      type: string
                    key:
                      description: Required. The taint key to be applied to a node.
                      type: string
                    timeAdded:
                      description: TimeAdded represents the time at which the taint
                        was added.
                      format: date-time
                      type: string
                    value:
                      description: The taint value corresponding to the taint key.
                      type: string
                  required:
                  - effect
                  - key
                  type: object
                type: array
            required:
            - cloudspaceName
            type: object
          status:
